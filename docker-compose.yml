services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smartsearch-postgres
    environment:
      POSTGRES_DB: smartsearch
      POSTGRES_USER: smartsearch
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - smartsearch_pgdata:/var/lib/postgresql/data
    mem_limit: 768m
    cpus: 1.0

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: smartsearch-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # Cap ZK heap (big win on laptops)
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx256m"
    ports:
      - "2181:2181"
    mem_limit: 384m
    cpus: 0.5
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: smartsearch-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_MESSAGE_MAX_BYTES: 52428800
      KAFKA_REPLICA_FETCH_MAX_BYTES: 52428800
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 52428800

      # ✅ Cap Kafka heap (most important)
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"

      # Lightweight dev tuning
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # ✅ Reduce log growth + smoother cleanup on laptops
      KAFKA_LOG_RETENTION_HOURS: 2
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_LOG_SEGMENT_BYTES: 104857600          # 100MB segments (not 1GB)
      KAFKA_LOG_RETENTION_BYTES: 1073741824       # 1GB total cap

    mem_limit: 1g
    cpus: 1.0

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: smartsearch-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    mem_limit: 384m
    cpus: 0.5

volumes:
  smartsearch_pgdata:
