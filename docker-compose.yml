services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smartsearch-postgres
    environment:
      POSTGRES_DB: smartsearch
      POSTGRES_USER: smartsearch
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - smartsearch_pgdata:/var/lib/postgresql/data
    mem_limit: 768m
    cpus: 1.0
  app:
    image: eclipse-temurin:21-jre
    container_name: smartsearch-app
    ports:
     - "8080:8080"	
    working_dir: /app
    volumes:
      - ./:/app
    command: ["sh", "-c", "echo 'Replace this with your Spring Boot run command' && sleep 3600"]
  prometheus:
    image: prom/prometheus:latest
    container_name: smartsearch-prometheus
    ports:
     - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"	  
  grafana:
    image: grafana/grafana:latest
    container_name: smartsearch-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana  	
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: smartsearch-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # Cap ZK heap (big win on laptops)
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx256m"
    ports:
      - "2181:2181"
    mem_limit: 384m
    cpus: 0.5
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: smartsearch-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_MESSAGE_MAX_BYTES: 52428800
      KAFKA_REPLICA_FETCH_MAX_BYTES: 52428800
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 52428800

      # ✅ Cap Kafka heap (most important)
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"

      # Lightweight dev tuning
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # ✅ Reduce log growth + smoother cleanup on laptops
      KAFKA_LOG_RETENTION_HOURS: 2
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_LOG_SEGMENT_BYTES: 104857600          # 100MB segments (not 1GB)
      KAFKA_LOG_RETENTION_BYTES: 1073741824       # 1GB total cap

    mem_limit: 1g
    cpus: 1.0

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: smartsearch-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    mem_limit: 384m
    cpus: 0.5

volumes:
  smartsearch_pgdata:
  grafana-data:	
version: '3.8'